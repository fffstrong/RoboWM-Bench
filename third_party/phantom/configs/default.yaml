# Default configuration (PHANTOM paper settings)
debug: false
verbose: false
skip_existing: false
n_processes: 1
data_root_dir: "../data/raw_data/"
processed_data_root_dir: "../data/processed_data/"
demo_name: ""

# Processing settings
mode: ["bbox"]  # Default processing mode - must be one of: bbox, hand2d, hand3d, hand_segmentation, arm_segmentation, action, smoothing, hand_inpaint, robot_inpaint, all
demo_num: null  # Process specific demo number (null = process all)

# Hand dataset processing settings
is_hand_dataset: false  # Set to true to process hand_dataset format
task_name: null  # Task name for hand_dataset (e.g., 'pick', 'push'). null = process all tasks
video_patterns: null  # Video patterns to filter (e.g., ['*_human_rgb.mp4', '*_veo_rgb.mp4']). null = process all
frame_idx: null  # Frame index to process (e.g., 0, 1, 2). null = process all frame indices

# Additional settings
debug_cameras: []

# PHANTOM paper configuration (default)
input_resolution: 720  # 1080  # 720
output_resolution: 240
robot: "Panda"  # Panda
gripper: "Robotiq85"
square: false  # true
epic: false
bimanual_setup: "single_arm"  # single_arm
target_hand: "left"  # left
constrained_hand: true  # for single arm setup, set to true to constrain the hand to the side of the robot base
depth_for_overlay: true  # for single arm setup, set to true to use depth for overlaying the hand and robot onto the background. For bimanual setup, set to false to avoid depth conflicts between the two arms.
render: false
camera_intrinsics: "camera/camera_intrinsics_mine_1280.json"
camera_extrinsics: "camera/camera_extrinsics_mine_new.json"
